name: Build and Release All Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers the release on version tags
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Prevents cancelling all builds if one fails
      matrix:
        include:
          # Linux (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: codesearch-linux-amd64
            bin_name: codesearch
            
          # Windows (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codesearch-windows-amd64.exe
            bin_name: codesearch.exe
            
          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: codesearch-mac-intel
            bin_name: codesearch
            
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: codesearch-mac-arm
            bin_name: codesearch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        # Using bash ensures the 'mv' command works smoothly across Linux, macOS, and Windows runners
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.bin_name }} ${{ matrix.artifact_name }}

      - name: Upload Artifact
        # Saves the binaries as downloadable artifacts on standard commits
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          
      - name: Publish to GitHub Releases
        # Only runs when a tag is pushed. The action will group all files from the matrix into a single release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
